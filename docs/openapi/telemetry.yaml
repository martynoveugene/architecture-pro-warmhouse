openapi: 3.0.3
info:
  title: Telemetry Microservice API
  version: 1.0.0
  description: API для просмотра телеметрии

servers:
  - url: http://localhost:8080/api/v1

paths:
  /telemetry/{sensorId}:
    get:
      summary: Получить телеметрию для устройства пользователя используя фильтр
      parameters:
        - name: sensorId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryFilter'
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TelemetryLog'


components:
  schemas:
    TelemetryFilter:
      type: object
      properties:
        start_time:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        end_time:
          type: string
          format: date-time
          example: "2024-01-01T23:59:59Z"
      required:
        - start_time
        - end_time

    TelemetryLog:
      type: object
      properties:
        id:
          type: integer
        sensorId:
          type: integer
        status:
          type: string
          enum: [active, inactive]
        value:
          type: number
        unit:
          type: string
          enum: [celsius, mmhg, pascal, percent]
        measurement:
          type: string
          enum: [temperature, humidity, battery_level]
        createdAt:
          type: string
          format: date-time

