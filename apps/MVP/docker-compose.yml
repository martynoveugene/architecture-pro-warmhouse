version: '3.8'

services:
  kafka:
    image: apache/kafka:latest
    container_name: mvp-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_LISTENERS=INSIDE://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INSIDE://mvp-kafka:29092,OUTSIDE://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INSIDE
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    networks:
      - mvp-network

  kafka-init:
    image: apache/kafka:latest
    depends_on:
      kafka:
        condition: service_started
    command: >
      /bin/sh -c "
      echo 'Waiting for Kafka...';
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server mvp-kafka:29092 --create --if-not-exists --topic sensor-info --partitions 1 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server mvp-kafka:29092 --create --if-not-exists --topic sensor-state --partitions 1 --replication-factor 1;
      echo 'Topics created:';
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server mvp-kafka:29092 --list;
      "
    networks:
      - mvp-network

  postgres-telemetry:
    image: postgres:16-alpine
    container_name: telemetry-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telemetry
    ports:
      - "5433:5432"
    networks:
      - mvp-network
    volumes:
      - telemetry_data:/var/lib/postgresql/data
      - ./telemetry-api/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telemetry"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s


  postgres:
    image: postgres:16-alpine
    container_name: mvp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smarthome
    ports:
      - "5432:5432"
    networks:
      - mvp-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../smart_home/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smarthome"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s


  telemetry-api:
    build: ./telemetry-api
    container_name: telemetry-api
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=jdbc:postgresql://telemetry-postgres:5432/telemetry
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - SERVER_PORT=8081
      - QUEUE_ADDRESS=mvp-kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mvp-network

  app:
    build:
      context: ../smart_home
      dockerfile: Dockerfile
    container_name: mvp-app
    depends_on:
      postgres:
        condition: service_healthy
      telemetry-api:
        condition: service_started
    environment:
      - DATABASE_URL=postgres://postgres:postgres@mvp-postgres:5432/smarthome
      - TEMPERATURE_API_URL=http://telemetry-api:8081
      - MVP=1
      - QUEUE_ADDRESS=mvp-kafka:29092
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - mvp-network

volumes:
  postgres_data:
  telemetry_data:

networks:
  mvp-network:
    driver: bridge