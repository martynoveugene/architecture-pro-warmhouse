version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smarthome-postgres
  ## тут нужно добавить настройки
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smarthome
    ports:
      - "5432:5432"
    networks:
      - smarthome-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./smart_home/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smarthome"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s


  temperature-api:
  ## тут нужно добавить приложение
    build: ./temperature-api
    container_name: temperature-api
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=jdbc:postgresql://smarthome-postgres:5432/smarthome
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - SERVER_PORT=8081
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smarthome-network

  app:
    build:
      context: ./smart_home
      dockerfile: Dockerfile
    container_name: smarthome-app
    depends_on:
      postgres:
        condition: service_healthy
      temperature-api:
        condition: service_started
    environment:
      - DATABASE_URL=postgres://postgres:postgres@smarthome-postgres:5432/smarthome
      - TEMPERATURE_API_URL=http://temperature-api:8081
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - smarthome-network

volumes:
  postgres_data:

networks:
  smarthome-network:
    driver: bridge